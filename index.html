<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>AeroVault — Concept</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@300;500;600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#07090f;
      --panel: rgba(7,9,15,.60);
      --panelBorder: rgba(255,255,255,.12);
      --text:#f3f5f9;
      --muted: rgba(243,245,249,.75);
      --gold:#d1b25a;
    }

    *{box-sizing:border-box}
    body{margin:0;font-family:Inter, system-ui,-apple-system, Segoe UI, Roboto; color:var(--text); background: var(--bg);}    
    a{color:inherit}

    .hero{position:relative;height:100vh;min-height:720px;overflow:hidden;display:flex;align-items:flex-end;justify-content:center;padding:40px 20px;}
    .hero video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;filter:saturate(1.05) contrast(1.05);}
    .overlay{position:absolute;inset:0;background: radial-gradient(circle at 20% 20%, rgba(0,0,0,.20), rgba(0,0,0,.72));}

    .panel{position:relative;max-width:1000px;width:100%;padding:26px 26px 22px;border-radius:18px;background:var(--panel);border:1px solid var(--panelBorder);backdrop-filter: blur(10px);}
    .brand{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
    .logoDot{width:12px;height:12px;border-radius:999px;background:var(--gold);box-shadow:0 0 0 5px rgba(209,178,90,.16);}
    .brand h1{margin:0;font-family:Cormorant, serif;font-weight:600;letter-spacing:.8px;}

    .sub{margin:10px 0 18px;max-width:740px;color:var(--muted);line-height:1.6;font-size:16px;}

    .controls{display:grid;grid-template-columns:repeat(4, minmax(160px, 1fr));gap:12px;align-items:center;}
    @media (max-width:900px){.controls{grid-template-columns:1fr 1fr;}}
    
    .input{padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.18);background: rgba(0,0,0,.35);color:var(--text);}    

    .cta{grid-column: span 1; border: 1px solid rgba(255,255,255,.18); background: transparent; color: var(--text); border-radius: 12px; padding: 12px 14px; font-weight: 600; cursor:pointer; transition:.2s;}
    .cta:hover{border-color: rgba(209,178,90,.55); color: var(--gold);}
    .cta[disabled]{cursor:not-allowed;opacity:.65;}

    .dots{display:flex;gap:6px;margin-top:22px;}
    .dots span{width:6px;height:6px;border-radius:999px;background: rgba(255,255,255,.35);}
    .dots span:nth-child(2){background: rgba(209,178,90,.75);}

    .footer{padding:22px 20px; text-align:center;color:rgba(243,245,249,.58);font-size:13px;}
  </style>
</head>

<body>
  <section class="hero">
    <video autoplay muted loop playsinline poster="https://images.unsplash.com/photo-1519589956828-016ff3b615d0?auto=format&fit=crop&w=2400&q=60">
      <source src="https://cdn.coverr.co/videos/coverr-private-jet-landing-3005/1080p.mp4" type="video/mp4">
    </video>
    <div class="overlay" aria-hidden="true"></div>

    <div class="panel">
      <div class="brand">
        <div class="logoDot"></div>
        <h1>AeroVault</h1>
      </div>
      <p class="sub">A minimalist vision for the modern private aviation marketplace. Search the fleet, compare capabilities, reserve shares, and close in secure deal rooms.</p>

      <div class="controls">
        <input class="input" placeholder="Passengers" />
        <input class="input" placeholder="Range (nm)" />
        <input class="input" placeholder="Budget (USD)" />
        <input class="input" placeholder="New / Used" />
        <button class="cta" disabled>Demo — visual only</button>
      </div>

      <div class="dots" aria-hidden="true"><span></span><span></span><span></span></div>
    </div>
  </section>

  <div class="footer">Concept demo • Not final UI</div>
</body>
</html>
